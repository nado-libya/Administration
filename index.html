<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Nado Libya | منظومة الإدارة الاحترافية v5.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <aside class="sidebar no-print">
        <div class="logo-area">
            <h1 class="logo-text">NADO</h1>
            <span class="logo-sub">LIBYA</span>
        </div>
        <nav>
            <button class="nav-link active" onclick="openTab('home')">لوحة التحكم 🏠</button>
            <button class="nav-link" onclick="openTab('employees')">الموظفين 👤</button>
            <button class="nav-link" onclick="openTab('expenses')">المصروفات 💸</button>
            <button class="nav-link" onclick="openTab('reports')">التقارير والطباعة 📄</button>
        </nav>
    </aside>

    <main class="main-content">
        <section id="home" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>صافي الرواتب (هذا الشهر) 💰</h3>
                    <p id="total-salaries-view">0.00 د.ل</p>
                </div>
                <div class="stat-card">
                    <h3>إجمالي المصروفات 📉</h3>
                    <p id="total-expenses-view">0.00 د.ل</p>
                </div>
            </div>
            <div class="hero-card mt-20">
                <h2>أهلاً بك في Nado Libya 🌟</h2>
                <p>النسخة 5.0 المطورة للتقارير الرسمية.</p>
            </div>
        </section>

        <section id="employees" class="tab-content">
            <div class="glass-card">
                <h3>إضافة موظف 👤</h3>
                <div class="form-grid">
                    <input type="text" id="empName" placeholder="الاسم الرباعي">
                    <input type="text" id="empJob" placeholder="المسمى الوظيفي">
                    <input type="number" id="empSalary" placeholder="الراتب الأساسي" oninput="autoCalcRate()">
                    <input type="number" id="hRate" placeholder="قيمة الساعة">
                </div>
                <button class="btn-primary mt-10" onclick="saveEmployee()">حفظ البيانات ✅</button>
            </div>

            <div class="glass-card mt-20">
                <h3>تسجيل غياب أو تأخير 📉</h3>
                <div class="form-grid">
                    <select id="empSelectAction"></select>
                    <input type="date" id="actDate">
                    <input type="text" id="actReason" placeholder="السبب">
                    <input type="number" id="actAmount" placeholder="القيمة المخصومة">
                </div>
                <button class="btn-warn mt-10" onclick="saveActionLog()">تسجيل العملية 📝</button>
            </div>
        </section>

        <section id="expenses" class="tab-content">
            <div class="glass-card">
                <h3 id="expense-form-title">إضافة مصروف جديد 💸</h3>
                <input type="hidden" id="editExpId">
                <div class="form-grid">
                    <input type="text" id="expItem" placeholder="بيان المشتريات">
                    <input type="number" id="expPrice" placeholder="القيمة">
                    <input type="date" id="expDate">
                </div>
                <button id="btn-save-exp" class="btn-primary mt-10" onclick="saveExpense()">إضافة المصروف ✅</button>
                <button id="btn-cancel-exp" class="btn-del mt-10" style="display:none" onclick="cancelEditExpense()">إلغاء التعديل</button>
            </div>

            <div class="glass-card mt-20">
                <h3>سجل المصروفات (تعديل/حذف) 📋</h3>
                <div id="expense-table-container"></div>
            </div>
        </section>

        <section id="reports" class="tab-content">
            <div class="glass-card no-print">
                <h3>تخصيص التقارير والإعدادات الرسمية 📄</h3>
                <div class="report-settings-grid">
                    <div class="setting-item">
                        <label>شعار الشركة:</label>
                        <input type="file" id="logoInput" accept="image/*" onchange="handleLogoUpload(event)">
                    </div>
                    <div class="setting-item">
                        <label>اسم الفرع:</label>
                        <input type="text" id="branchName" placeholder="مثلاً: فرع طرابلس" oninput="updateStats()">
                    </div>
                    <div class="setting-item">
                        <label>ثيم التقرير:</label>
                        <select id="themeSelect">
                            <option value="classic">كلاسيكي (أبيض واسود)</option>
                            <option value="modern">مودرن (أزرق ملكي)</option>
                            <option value="elegant">فاخر (ذهبي وأسود)</option>
                        </select>
                    </div>
                </div>
                
                <hr class="mt-10">
                <div class="report-controls">
                    <input type="month" id="reportMonthSelect">
                    <button class="btn-outline" onclick="genFullEmpReport()">تقرير الرواتب الشامل</button>
                    <button class="btn-outline" onclick="genFullExpReport()">تقرير المصروفات</button>
                </div>
                <div class="single-rep-box mt-10">
                    <select id="empSelectReport"></select>
                    <button class="btn-outline" onclick="genIndividualReport()">تقرير موظف محدد</button>
                </div>
                <div class="print-actions mt-20">
                    <button class="btn-success" onclick="printToPDF()">تحميل PDF 📥</button>
                    <button class="btn-primary" style="width: 100%; margin-top: 10px;" onclick="window.print()">طباعة مباشرة 🖨️</button>
                </div>
            </div>

            <div id="report-paper" class="report-sheet">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
